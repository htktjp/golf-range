<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ゴルフ距離リング</title>

  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <style>
    :root{
      --jp-font: "Noto Sans JP","Hiragino Sans","Yu Gothic","Meiryo",system-ui,sans-serif;
    }

    html, body {
      height: 100%;
      margin: 0;
      font-family: var(--jp-font);
      overflow: hidden;
      background: #000;
    }

    #mapWrap {
      position: absolute;
      inset: 0;
    }

    #map {
      position: absolute;
      inset: 0;
    }

    #overlay {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      width: 100vw;
      height: 100vh;
    }

    .toolbar {
      position: absolute;
      left: 12px;
      top: 12px;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-width: calc(100vw - 24px);
    }

    .btn {
      border: 0;
      border-radius: 14px;
      padding: 11px 14px;
      background: rgba(17,17,17,0.92);
      color: #fff;
      font-family: var(--jp-font);
      font-size: 14px;
      font-weight: 800;
      box-shadow: 0 8px 22px rgba(0,0,0,0.25);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .btn.secondary {
      background: rgba(255,255,255,0.92);
      color: #111;
    }

    .btn.recording {
      background: rgba(220, 38, 38, 0.95);
      color: #fff;
    }

    #fileInput {
      display: none;
    }

    .maplibregl-ctrl,
    .maplibregl-ctrl-bottom-left,
    .maplibregl-ctrl-bottom-right {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="mapWrap">
    <div id="map"></div>
    <canvas id="overlay"></canvas>

    <div class="toolbar">
      <button id="gpsBtn" class="btn" type="button">位置情報を更新</button>
      <button id="startRecordBtn" class="btn secondary" type="button">位置記録開始</button>
      <button id="stopRecordBtn" class="btn secondary" type="button">位置記録終了</button>
      <button id="saveRecordBtn" class="btn secondary" type="button">記録を保存</button>
      <button id="loadRecordBtn" class="btn secondary" type="button">記録を呼び出し</button>
      <input id="fileInput" type="file" accept=".json,application/json" />
    </div>
  </div>

  <script>
    // ======================
    // 設定
    // ======================
    const YARD_TO_M = 0.9144;
    const GPS_UPDATE_INTERVAL_MS = 10000;

    const RINGS = [
      { yd: 50,  m: 50  * YARD_TO_M, color: "#E53935" },
      { yd: 100, m: 100 * YARD_TO_M, color: "#1E88E5" },
      { yd: 150, m: 150 * YARD_TO_M, color: "#E53935" },
      { yd: 200, m: 200 * YARD_TO_M, color: "#1E88E5" }
    ];

    const gsiPhotoTiles = "https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg";
    const initialCenter = [139.767, 35.681];
    const initialZoom = 16;

    // ======================
    // DOM
    // ======================
    const gpsBtn = document.getElementById("gpsBtn");
    const startRecordBtn = document.getElementById("startRecordBtn");
    const stopRecordBtn = document.getElementById("stopRecordBtn");
    const saveRecordBtn = document.getElementById("saveRecordBtn");
    const loadRecordBtn = document.getElementById("loadRecordBtn");
    const fileInput = document.getElementById("fileInput");

    // ======================
    // 地図
    // ======================
    const map = new maplibregl.Map({
      container: "map",
      style: {
        version: 8,
        sources: {
          "gsi-photo": {
            type: "raster",
            tiles: [gsiPhotoTiles],
            tileSize: 256
          }
        },
        layers: [
          {
            id: "gsi-photo-layer",
            type: "raster",
            source: "gsi-photo"
          }
        ]
      },
      center: initialCenter,
      zoom: initialZoom,
      bearing: 0,
      pitch: 0,
      antialias: true,
      attributionControl: false
    });

    // ======================
    // Canvas Overlay
    // ======================
    const canvas = document.getElementById("overlay");
    const ctx = canvas.getContext("2d");

    let dpr = 1;
    let cssW = 0;
    let cssH = 0;

    function resizeCanvas() {
      dpr = Math.max(1, window.devicePixelRatio || 1);
      cssW = Math.floor(window.innerWidth);
      cssH = Math.floor(window.innerHeight);

      canvas.style.width = cssW + "px";
      canvas.style.height = cssH + "px";
      canvas.width = Math.floor(cssW * dpr);
      canvas.height = Math.floor(cssH * dpr);

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function destinationPoint(latDeg, lngDeg, distM, bearingDeg) {
      const R = 6378137;
      const brng = bearingDeg * Math.PI / 180;
      const lat1 = latDeg * Math.PI / 180;
      const lng1 = lngDeg * Math.PI / 180;
      const angDist = distM / R;

      const lat2 = Math.asin(
        Math.sin(lat1) * Math.cos(angDist) +
        Math.cos(lat1) * Math.sin(angDist) * Math.cos(brng)
      );

      const lng2 = lng1 + Math.atan2(
        Math.sin(brng) * Math.sin(angDist) * Math.cos(lat1),
        Math.cos(angDist) - Math.sin(lat1) * Math.sin(lat2)
      );

      return {
        lat: lat2 * 180 / Math.PI,
        lng: lng2 * 180 / Math.PI
      };
    }

    function drawLabel(text, x, y) {
      ctx.save();
      ctx.font = 'bold 18px "Noto Sans JP","Hiragino Sans","Yu Gothic","Meiryo",system-ui,sans-serif';
      ctx.textAlign = "center";
      ctx.textBaseline = "bottom";
      ctx.lineWidth = 6;
      ctx.strokeStyle = "rgba(0,0,0,0.92)";
      ctx.strokeText(text, x, y);
      ctx.fillStyle = "#FFFFFF";
      ctx.fillText(text, x, y);
      ctx.restore();
    }

    function drawCenterDot(x, y) {
      ctx.save();

      ctx.beginPath();
      ctx.arc(x, y, 7, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,255,255,0.95)";
      ctx.fill();

      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(17,17,17,0.9)";
      ctx.fill();

      ctx.restore();
    }

    function drawTrackLine() {
      if (!trackPoints.length) return;

      ctx.save();
      ctx.lineWidth = 4;
      ctx.strokeStyle = "rgba(255, 215, 0, 0.95)";
      ctx.lineJoin = "round";
      ctx.lineCap = "round";
      ctx.beginPath();

      for (let i = 0; i < trackPoints.length; i++) {
        const p = map.project([trackPoints[i].lng, trackPoints[i].lat]);
        const x = p.x;
        const y = p.y;

        if (i === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      }

      ctx.stroke();

      // 点も描く
      for (let i = 0; i < trackPoints.length; i++) {
        const p = map.project([trackPoints[i].lng, trackPoints[i].lat]);
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
        ctx.fillStyle = i === 0 ? "rgba(0,255,128,0.95)" : "rgba(255,215,0,0.95)";
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = "rgba(0,0,0,0.8)";
        ctx.stroke();
      }
      ctx.restore();
    }

    function redrawOverlay() {
      ctx.clearRect(0, 0, cssW, cssH);

      const c = map.getCenter();
      const centerLng = c.lng;
      const centerLat = c.lat;

      const cx = cssW / 2;
      const cy = cssH / 2;

      for (const r of RINGS) {
        const east = destinationPoint(centerLat, centerLng, r.m, 90);
        const pCenter = map.project([centerLng, centerLat]);
        const pEast = map.project([east.lng, east.lat]);
        const radiusPx = Math.hypot(pEast.x - pCenter.x, pEast.y - pCenter.y);

        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, radiusPx, 0, Math.PI * 2);
        ctx.lineWidth = 2.8;
        ctx.strokeStyle = r.color;
        ctx.globalAlpha = 0.98;
        ctx.stroke();

        ctx.globalAlpha = 0.06;
        ctx.fillStyle = r.color;
        ctx.fill();
        ctx.restore();

        drawLabel(`${r.yd}yd`, cx, cy - radiusPx - 6);
      }

      drawTrackLine();
      drawCenterDot(cx, cy);
    }

    // ======================
    // 記録データ
    // ======================
    let trackPoints = [];
    let isRecording = false;
    let gpsTimerId = null;
    let isLocating = false;

    function updateRecordButtonState() {
      if (isRecording) {
        startRecordBtn.classList.add("recording");
        startRecordBtn.textContent = "記録中";
      } else {
        startRecordBtn.classList.remove("recording");
        startRecordBtn.textContent = "位置記録開始";
      }
    }

    function getTimestampString() {
      const now = new Date();
      const pad = (n) => String(n).padStart(2, "0");
      return (
        now.getFullYear() +
        pad(now.getMonth() + 1) +
        pad(now.getDate()) + "_" +
        pad(now.getHours()) +
        pad(now.getMinutes()) +
        pad(now.getSeconds())
      );
    }

    function buildRecordJson() {
      return {
        type: "golf-track",
        version: 1,
        createdAt: new Date().toISOString(),
        points: trackPoints.map(p => ({
          lat: p.lat,
          lng: p.lng,
          accuracy: p.accuracy ?? null,
          timestamp: p.timestamp
        }))
      };
    }

    function addTrackPoint(lat, lng, accuracy = null) {
      const last = trackPoints.length ? trackPoints[trackPoints.length - 1] : null;

      // 完全同一なら追加しない
      if (last && last.lat === lat && last.lng === lng) {
        return;
      }

      trackPoints.push({
        lat,
        lng,
        accuracy,
        timestamp: new Date().toISOString()
      });

      redrawOverlay();
    }

    function fitTrackToView() {
      if (!trackPoints.length) return;
      if (trackPoints.length === 1) {
        map.easeTo({
          center: [trackPoints[0].lng, trackPoints[0].lat],
          zoom: Math.max(map.getZoom(), 18),
          duration: 500
        });
        return;
      }

      const bounds = new maplibregl.LngLatBounds(
        [trackPoints[0].lng, trackPoints[0].lat],
        [trackPoints[0].lng, trackPoints[0].lat]
      );

      for (const p of trackPoints) {
        bounds.extend([p.lng, p.lat]);
      }

      map.fitBounds(bounds, {
        padding: { top: 80, right: 40, bottom: 40, left: 40 },
        duration: 700,
        maxZoom: 19
      });
    }

    // ======================
    // GPS
    // ======================
    function setGpsButtonText(text) {
      gpsBtn.textContent = text;
    }

    function locateOnce(options = { saveIfRecording: false, recenter: true }) {
      if (!("geolocation" in navigator)) return;
      if (isLocating) return;

      isLocating = true;
      setGpsButtonText("取得中…");

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const lng = pos.coords.longitude;
          const lat = pos.coords.latitude;
          const accuracy = pos.coords.accuracy ?? null;

          if (options.recenter) {
            map.easeTo({
              center: [lng, lat],
              zoom: Math.max(map.getZoom(), 16),
              duration: 250
            });
          }

          if (options.saveIfRecording && isRecording) {
            addTrackPoint(lat, lng, accuracy);
          }

          isLocating = false;
          setGpsButtonText("位置情報を更新");
          redrawOverlay();
        },
        (_err) => {
          isLocating = false;
          setGpsButtonText("位置情報を更新");
          redrawOverlay();
        },
        {
          enableHighAccuracy: true,
          maximumAge: 0,
          timeout: 15000
        }
      );
    }

    function startRecording() {
      if (isRecording) return;

      isRecording = true;
      updateRecordButtonState();

      // 開始時に1回すぐ取得
      locateOnce({ saveIfRecording: true, recenter: true });

      // 10秒ごと更新
      gpsTimerId = window.setInterval(() => {
        locateOnce({ saveIfRecording: true, recenter: true });
      }, GPS_UPDATE_INTERVAL_MS);
    }

    function stopRecording() {
      isRecording = false;
      updateRecordButtonState();

      if (gpsTimerId !== null) {
        window.clearInterval(gpsTimerId);
        gpsTimerId = null;
      }
    }

    // ======================
    // 保存・読込
    // ======================
    function saveTrackJson() {
      const data = buildRecordJson();
      const blob = new Blob(
        [JSON.stringify(data, null, 2)],
        { type: "application/json;charset=utf-8" }
      );

      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `golf_track_${getTimestampString()}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();

      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function loadTrackJsonFromFile(file) {
      const reader = new FileReader();

      reader.onload = () => {
        try {
          const json = JSON.parse(reader.result);

          if (!json || !Array.isArray(json.points)) {
            throw new Error("JSON形式が不正です。");
          }

          const loaded = [];
          for (const p of json.points) {
            if (
              typeof p.lat !== "number" ||
              typeof p.lng !== "number"
            ) {
              continue;
            }

            loaded.push({
              lat: p.lat,
              lng: p.lng,
              accuracy: typeof p.accuracy === "number" ? p.accuracy : null,
              timestamp: typeof p.timestamp === "string" ? p.timestamp : new Date().toISOString()
            });
          }

          trackPoints = loaded;
          redrawOverlay();
          fitTrackToView();
        } catch (err) {
          alert("JSONの読み込みに失敗しました。");
          console.error(err);
        }
      };

      reader.readAsText(file, "utf-8");
    }

    // ======================
    // ボタン
    // ======================
    gpsBtn.addEventListener("click", () => {
      locateOnce({ saveIfRecording: false, recenter: true });
    });

    startRecordBtn.addEventListener("click", () => {
      startRecording();
    });

    stopRecordBtn.addEventListener("click", () => {
      stopRecording();
    });

    saveRecordBtn.addEventListener("click", () => {
      if (!trackPoints.length) {
        alert("保存する記録がありません。");
        return;
      }
      saveTrackJson();
    });

    loadRecordBtn.addEventListener("click", () => {
      fileInput.value = "";
      fileInput.click();
    });

    fileInput.addEventListener("change", (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      loadTrackJsonFromFile(file);
    });

    // ======================
    // 起動
    // ======================
    function setup() {
      resizeCanvas();
      redrawOverlay();
      updateRecordButtonState();
    }

    map.on("load", () => {
      setup();

      map.on("render", () => {
        redrawOverlay();
      });

      // 初回のみ一度取得を試す
      locateOnce({ saveIfRecording: false, recenter: true });
    });

    window.addEventListener("resize", () => {
      resizeCanvas();
      redrawOverlay();
    });

    setTimeout(() => {
      resizeCanvas();
      redrawOverlay();
    }, 300);
  </script>
</body>
</html>
