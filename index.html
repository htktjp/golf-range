<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ゴルフ距離リング</title>

  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <style>
    :root{
      --jp-font: "Noto Sans JP","Hiragino Sans","Yu Gothic","Meiryo",system-ui,sans-serif;
    }

    html, body {
      height: 100%;
      margin: 0;
      font-family: var(--jp-font);
      overflow: hidden;
      background: #000;
    }

    #mapWrap {
      position: absolute;
      inset: 0;
    }

    #map {
      position: absolute;
      inset: 0;
    }

    #overlay {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      width: 100vw;
      height: 100vh;
    }

    .toolbar {
      position: absolute;
      left: 12px;
      top: 12px;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-width: calc(100vw - 24px);
    }

    .btn {
      border: 0;
      border-radius: 14px;
      padding: 11px 14px;
      background: rgba(17,17,17,0.92);
      color: #fff;
      font-family: var(--jp-font);
      font-size: 14px;
      font-weight: 800;
      box-shadow: 0 8px 22px rgba(0,0,0,0.25);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .btn.secondary {
      background: rgba(255,255,255,0.92);
      color: #111;
    }

    .btn.recording {
      background: rgba(220, 38, 38, 0.95);
      color: #fff;
    }

    #fileInput {
      display: none;
    }

    .bottomStatus {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 20;
      display: none;
      background: rgba(255,255,255,0.92);
      border-radius: 14px;
      padding: 10px 14px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.18);
      backdrop-filter: blur(6px);
    }

    .bottomStatus.show {
      display: block;
    }

    .bottomStatus .warning {
      color: #d32f2f;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.35;
    }

    .bottomStatus .distance {
      color: #111;
      font-size: 15px;
      font-weight: 800;
      line-height: 1.4;
      margin-top: 4px;
    }

    .maplibregl-ctrl,
    .maplibregl-ctrl-bottom-left,
    .maplibregl-ctrl-bottom-right {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="mapWrap">
    <div id="map"></div>
    <canvas id="overlay"></canvas>

    <div class="toolbar">
      <button id="startRecordBtn" class="btn secondary" type="button">位置記録開始</button>
      <button id="stopRecordBtn" class="btn secondary" type="button">位置記録終了</button>
      <button id="saveRecordBtn" class="btn secondary" type="button">記録を保存</button>
      <button id="loadRecordBtn" class="btn secondary" type="button">記録を呼び出し</button>
      <input id="fileInput" type="file" accept=".json,application/json" />
    </div>

    <div id="bottomStatus" class="bottomStatus">
      <div id="warningText" class="warning">記録中はアプリを閉じないで下さい</div>
      <div id="distanceText" class="distance">トータル移動距離：0yd（0m）※目安です</div>
    </div>
  </div>

  <script>
    // ======================
    // 設定
    // ======================
    const YARD_TO_M = 0.9144;
    const GPS_UPDATE_INTERVAL_MS = 5000;          // 5秒
    const AUTO_STOP_MS = 6 * 60 * 60 * 1000;     // 6時間
    const MIN_DISTANCE_FOR_TOTAL_M = 8;          // 8m未満はトータル距離に加算しない
    const MIN_DISTANCE_FOR_TRACK_POINT_M = 8;    // 8m未満は同じ場所とみなして線を引かない

    // 同位置判定
    const SAME_LOCATION_RADIUS_M = 8;            // 8m以内を同位置とみなす
    const SAME_LOCATION_SECONDS_FOR_SHOT = 60;   // 60秒
    const SAME_LOCATION_MIN_COUNT = Math.ceil(SAME_LOCATION_SECONDS_FOR_SHOT * 1000 / GPS_UPDATE_INTERVAL_MS); // 12回

    const RINGS = [
      { yd: 50,  m: 50  * YARD_TO_M, color: "#E53935" },
      { yd: 100, m: 100 * YARD_TO_M, color: "#1E88E5" },
      { yd: 150, m: 150 * YARD_TO_M, color: "#E53935" },
      { yd: 200, m: 200 * YARD_TO_M, color: "#1E88E5" }
    ];

    const gsiPhotoTiles = "https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg";
    const initialCenter = [139.767, 35.681];
    const initialZoom = 16;

    // ======================
    // DOM
    // ======================
    const startRecordBtn = document.getElementById("startRecordBtn");
    const stopRecordBtn = document.getElementById("stopRecordBtn");
    const saveRecordBtn = document.getElementById("saveRecordBtn");
    const loadRecordBtn = document.getElementById("loadRecordBtn");
    const fileInput = document.getElementById("fileInput");
    const bottomStatus = document.getElementById("bottomStatus");
    const warningText = document.getElementById("warningText");
    const distanceText = document.getElementById("distanceText");

    // ======================
    // 地図
    // ======================
    const map = new maplibregl.Map({
      container: "map",
      style: {
        version: 8,
        sources: {
          "gsi-photo": {
            type: "raster",
            tiles: [gsiPhotoTiles],
            tileSize: 256
          }
        },
        layers: [
          {
            id: "gsi-photo-layer",
            type: "raster",
            source: "gsi-photo"
          }
        ]
      },
      center: initialCenter,
      zoom: initialZoom,
      bearing: 0,
      pitch: 0,
      antialias: true,
      attributionControl: false
    });

    // ======================
    // Canvas Overlay
    // ======================
    const canvas = document.getElementById("overlay");
    const ctx = canvas.getContext("2d");

    let dpr = 1;
    let cssW = 0;
    let cssH = 0;

    function resizeCanvas() {
      dpr = Math.max(1, window.devicePixelRatio || 1);
      cssW = Math.floor(window.innerWidth);
      cssH = Math.floor(window.innerHeight);

      canvas.style.width = cssW + "px";
      canvas.style.height = cssH + "px";
      canvas.width = Math.floor(cssW * dpr);
      canvas.height = Math.floor(cssH * dpr);

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function destinationPoint(latDeg, lngDeg, distM, bearingDeg) {
      const R = 6378137;
      const brng = bearingDeg * Math.PI / 180;
      const lat1 = latDeg * Math.PI / 180;
      const lng1 = lngDeg * Math.PI / 180;
      const angDist = distM / R;

      const lat2 = Math.asin(
        Math.sin(lat1) * Math.cos(angDist) +
        Math.cos(lat1) * Math.sin(angDist) * Math.cos(brng)
      );

      const lng2 = lng1 + Math.atan2(
        Math.sin(brng) * Math.sin(angDist) * Math.cos(lat1),
        Math.cos(angDist) - Math.sin(lat1) * Math.sin(lat2)
      );

      return {
        lat: lat2 * 180 / Math.PI,
        lng: lng2 * 180 / Math.PI
      };
    }

    function drawLabel(text, x, y) {
      ctx.save();
      ctx.font = 'bold 18px "Noto Sans JP","Hiragino Sans","Yu Gothic","Meiryo",system-ui,sans-serif';
      ctx.textAlign = "center";
      ctx.textBaseline = "bottom";
      ctx.lineWidth = 6;
      ctx.strokeStyle = "rgba(0,0,0,0.92)";
      ctx.strokeText(text, x, y);
      ctx.fillStyle = "#FFFFFF";
      ctx.fillText(text, x, y);
      ctx.restore();
    }

    function drawCenterDot(x, y) {
      ctx.save();

      ctx.beginPath();
      ctx.arc(x, y, 7, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,255,255,0.95)";
      ctx.fill();

      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(17,17,17,0.9)";
      ctx.fill();

      ctx.restore();
    }

    function drawTrackLine() {
      if (!trackPoints.length) return;

      ctx.save();
      ctx.lineWidth = 4;
      ctx.strokeStyle = "rgba(255, 215, 0, 0.95)";
      ctx.lineJoin = "round";
      ctx.lineCap = "round";
      ctx.beginPath();

      for (let i = 0; i < trackPoints.length; i++) {
        const p = map.project([trackPoints[i].lng, trackPoints[i].lat]);
        if (i === 0) {
          ctx.moveTo(p.x, p.y);
        } else {
          ctx.lineTo(p.x, p.y);
        }
      }

      ctx.stroke();

      for (let i = 0; i < trackPoints.length; i++) {
        const p = map.project([trackPoints[i].lng, trackPoints[i].lat]);
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
        ctx.fillStyle = i === 0 ? "rgba(0,255,128,0.95)" : "rgba(255,215,0,0.95)";
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = "rgba(0,0,0,0.8)";
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawShotMarkers() {
      if (!shotMarkers.length) return;

      ctx.save();

      for (const marker of shotMarkers) {
        const p = map.project([marker.lng, marker.lat]);

        ctx.beginPath();
        ctx.arc(p.x, p.y, 10, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(30, 136, 229, 0.92)";
        ctx.fill();
        ctx.lineWidth = 3;
        ctx.strokeStyle = "rgba(255,255,255,0.95)";
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.95)";
        ctx.fill();
      }

      ctx.restore();
    }

    function redrawOverlay() {
      ctx.clearRect(0, 0, cssW, cssH);

      const c = map.getCenter();
      const centerLng = c.lng;
      const centerLat = c.lat;

      const cx = cssW / 2;
      const cy = cssH / 2;

      for (const r of RINGS) {
        const east = destinationPoint(centerLat, centerLng, r.m, 90);
        const pCenter = map.project([centerLng, centerLat]);
        const pEast = map.project([east.lng, east.lat]);
        const radiusPx = Math.hypot(pEast.x - pCenter.x, pEast.y - pCenter.y);

        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, radiusPx, 0, Math.PI * 2);
        ctx.lineWidth = 2.8;
        ctx.strokeStyle = r.color;
        ctx.globalAlpha = 0.98;
        ctx.stroke();

        ctx.globalAlpha = 0.06;
        ctx.fillStyle = r.color;
        ctx.fill();
        ctx.restore();

        drawLabel(`${r.yd}yd`, cx, cy - radiusPx - 6);
      }

      drawTrackLine();
      drawShotMarkers();
      drawCenterDot(cx, cy);
    }

    // ======================
    // 距離計算
    // ======================
    function distanceMeters(lat1, lng1, lat2, lng2) {
      const R = 6378137;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLng / 2) * Math.sin(dLng / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function totalTrackDistanceMeters() {
      if (trackPoints.length < 2) return 0;

      let total = 0;
      for (let i = 1; i < trackPoints.length; i++) {
        const seg = distanceMeters(
          trackPoints[i - 1].lat,
          trackPoints[i - 1].lng,
          trackPoints[i].lat,
          trackPoints[i].lng
        );
        if (seg >= MIN_DISTANCE_FOR_TOTAL_M) {
          total += seg;
        }
      }
      return total;
    }

    function formatTotalDistanceText() {
      const totalM = Math.round(totalTrackDistanceMeters());
      const totalYd = Math.round(totalM / YARD_TO_M);
      return `トータル移動距離：${totalYd}yd（${totalM}m）※目安です`;
    }

    function updateBottomStatus() {
      const hasTrack = trackPoints.length > 0;

      if (isRecording) {
        bottomStatus.classList.add("show");
        warningText.style.display = "block";
        distanceText.textContent = formatTotalDistanceText();
        return;
      }

      if (hasTrack) {
        bottomStatus.classList.add("show");
        warningText.style.display = "none";
        distanceText.textContent = formatTotalDistanceText();
        return;
      }

      bottomStatus.classList.remove("show");
      warningText.style.display = "none";
      distanceText.textContent = "トータル移動距離：0yd（0m）※目安です";
    }

    // ======================
    // 記録データ
    // ======================
    let trackPoints = [];
    let shotMarkers = [];
    let isRecording = false;
    let gpsTimerId = null;
    let autoStopTimerId = null;
    let isLocating = false;

    // 同位置滞在判定用
    let stationaryCluster = null;

    // ======================
    // Wake Lock
    // ======================
    let wakeLockSentinel = null;

    async function requestWakeLock() {
      try {
        if (!("wakeLock" in navigator)) return;
        if (document.visibilityState !== "visible") return;
        if (wakeLockSentinel) return;

        wakeLockSentinel = await navigator.wakeLock.request("screen");

        wakeLockSentinel.addEventListener("release", () => {
          wakeLockSentinel = null;
        });
      } catch (_err) {
      }
    }

    async function releaseWakeLock() {
      try {
        if (wakeLockSentinel) {
          await wakeLockSentinel.release();
          wakeLockSentinel = null;
        }
      } catch (_err) {
        wakeLockSentinel = null;
      }
    }

    async function refreshWakeLock() {
      await releaseWakeLock();
      await requestWakeLock();
    }

    // ======================
    // UI状態
    // ======================
    function updateRecordButtonState() {
      if (isRecording) {
        startRecordBtn.classList.add("recording");
        startRecordBtn.textContent = "記録中";
      } else {
        startRecordBtn.classList.remove("recording");
        startRecordBtn.textContent = "位置記録開始";
      }
      updateBottomStatus();
    }

    function getTimestampString() {
      const now = new Date();
      const pad = (n) => String(n).padStart(2, "0");
      return (
        now.getFullYear() +
        pad(now.getMonth() + 1) +
        pad(now.getDate()) + "_" +
        pad(now.getHours()) +
        pad(now.getMinutes()) +
        pad(now.getSeconds())
      );
    }

    function buildRecordJson() {
      return {
        type: "golf-track",
        version: 4,
        createdAt: new Date().toISOString(),
        points: trackPoints.map(p => ({
          lat: p.lat,
          lng: p.lng,
          accuracy: p.accuracy ?? null,
          timestamp: p.timestamp
        })),
        shotMarkers: shotMarkers.map(m => ({
          lat: m.lat,
          lng: m.lng,
          count: m.count,
          source: m.source || "stationary",
          timestamp: m.timestamp || null
        }))
      };
    }

    function shotMarkerExistsNear(lat, lng, radiusM = SAME_LOCATION_RADIUS_M) {
      return shotMarkers.some(m => distanceMeters(lat, lng, m.lat, m.lng) < radiusM);
    }

    function addShotMarker(lat, lng, count, timestamp = null) {
      if (shotMarkerExistsNear(lat, lng)) return;

      shotMarkers.push({
        lat,
        lng,
        count,
        source: "stationary",
        timestamp
      });
    }

    function recomputeShotMarkersFromLoadedTrack() {
      // 読み込み時にマーカーが無い旧データ向け
      shotMarkers = [];

      if (!trackPoints.length) return;

      let cluster = null;

      for (let i = 0; i < trackPoints.length; i++) {
        const p = trackPoints[i];

        if (!cluster) {
          cluster = {
            lat: p.lat,
            lng: p.lng,
            count: 1,
            firstTimestamp: p.timestamp || null,
            lastTimestamp: p.timestamp || null
          };
          continue;
        }

        const d = distanceMeters(cluster.lat, cluster.lng, p.lat, p.lng);

        if (d < SAME_LOCATION_RADIUS_M) {
          cluster.lat = (cluster.lat * cluster.count + p.lat) / (cluster.count + 1);
          cluster.lng = (cluster.lng * cluster.count + p.lng) / (cluster.count + 1);
          cluster.count += 1;
          cluster.lastTimestamp = p.timestamp || cluster.lastTimestamp;

          if (cluster.count >= SAME_LOCATION_MIN_COUNT) {
            addShotMarker(cluster.lat, cluster.lng, cluster.count, cluster.lastTimestamp);
          }
        } else {
          cluster = {
            lat: p.lat,
            lng: p.lng,
            count: 1,
            firstTimestamp: p.timestamp || null,
            lastTimestamp: p.timestamp || null
          };
        }
      }
    }

    function addTrackPoint(lat, lng, accuracy = null) {
      const timestamp = new Date().toISOString();
      const last = trackPoints.length ? trackPoints[trackPoints.length - 1] : null;

      // 同位置滞在判定は「生の更新」ベースで行う
      if (!stationaryCluster) {
        stationaryCluster = {
          lat,
          lng,
          count: 1,
          firstTimestamp: timestamp,
          lastTimestamp: timestamp
        };
      } else {
        const stationaryDist = distanceMeters(stationaryCluster.lat, stationaryCluster.lng, lat, lng);

        if (stationaryDist < SAME_LOCATION_RADIUS_M) {
          stationaryCluster.lat = (stationaryCluster.lat * stationaryCluster.count + lat) / (stationaryCluster.count + 1);
          stationaryCluster.lng = (stationaryCluster.lng * stationaryCluster.count + lng) / (stationaryCluster.count + 1);
          stationaryCluster.count += 1;
          stationaryCluster.lastTimestamp = timestamp;

          if (stationaryCluster.count >= SAME_LOCATION_MIN_COUNT) {
            addShotMarker(
              stationaryCluster.lat,
              stationaryCluster.lng,
              stationaryCluster.count,
              stationaryCluster.lastTimestamp
            );
          }
        } else {
          stationaryCluster = {
            lat,
            lng,
            count: 1,
            firstTimestamp: timestamp,
            lastTimestamp: timestamp
          };
        }
      }

      // 線記録は8m未満なら追加しない
      if (last) {
        const moveDist = distanceMeters(last.lat, last.lng, lat, lng);
        if (moveDist < MIN_DISTANCE_FOR_TRACK_POINT_M) {
          updateBottomStatus();
          redrawOverlay();
          return;
        }
      }

      trackPoints.push({
        lat,
        lng,
        accuracy,
        timestamp
      });

      updateBottomStatus();
      redrawOverlay();
    }

    function fitTrackToView() {
      const allPoints = [];

      for (const p of trackPoints) {
        allPoints.push([p.lng, p.lat]);
      }
      for (const m of shotMarkers) {
        allPoints.push([m.lng, m.lat]);
      }

      if (!allPoints.length) return;

      if (allPoints.length === 1) {
        map.easeTo({
          center: allPoints[0],
          zoom: Math.max(map.getZoom(), 18),
          duration: 500
        });
        return;
      }

      const bounds = new maplibregl.LngLatBounds(allPoints[0], allPoints[0]);
      for (const pt of allPoints) {
        bounds.extend(pt);
      }

      map.fitBounds(bounds, {
        padding: { top: 80, right: 40, bottom: 100, left: 40 },
        duration: 700,
        maxZoom: 19
      });
    }

    // ======================
    // GPS
    // ======================
    function locateOnce(options = { saveIfRecording: false, recenter: true }) {
      if (!("geolocation" in navigator)) return;
      if (isLocating) return;

      isLocating = true;

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const lng = pos.coords.longitude;
          const lat = pos.coords.latitude;
          const accuracy = pos.coords.accuracy ?? null;

          if (options.recenter) {
            map.easeTo({
              center: [lng, lat],
              zoom: Math.max(map.getZoom(), 16),
              duration: 250
            });
          }

          if (options.saveIfRecording && isRecording) {
            addTrackPoint(lat, lng, accuracy);
          }

          isLocating = false;
          redrawOverlay();
        },
        (_err) => {
          isLocating = false;
          redrawOverlay();
        },
        {
          enableHighAccuracy: true,
          maximumAge: 0,
          timeout: 15000
        }
      );
    }

    function clearRecordingTimers() {
      if (gpsTimerId !== null) {
        window.clearInterval(gpsTimerId);
        gpsTimerId = null;
      }
      if (autoStopTimerId !== null) {
        window.clearTimeout(autoStopTimerId);
        autoStopTimerId = null;
      }
    }

    async function startRecording() {
      if (isRecording) return;

      isRecording = true;
      updateRecordButtonState();

      await refreshWakeLock();

      locateOnce({ saveIfRecording: true, recenter: true });

      gpsTimerId = window.setInterval(() => {
        locateOnce({ saveIfRecording: true, recenter: true });
      }, GPS_UPDATE_INTERVAL_MS);

      autoStopTimerId = window.setTimeout(() => {
        stopRecording();
      }, AUTO_STOP_MS);
    }

    function stopRecording() {
      isRecording = false;
      updateRecordButtonState();
      clearRecordingTimers();
    }

    // ======================
    // 保存・読込
    // ======================
    function saveTrackJson() {
      const data = buildRecordJson();
      const blob = new Blob(
        [JSON.stringify(data, null, 2)],
        { type: "application/json;charset=utf-8" }
      );

      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `golf_track_${getTimestampString()}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();

      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function loadTrackJsonFromFile(file) {
      const reader = new FileReader();

      reader.onload = () => {
        try {
          const json = JSON.parse(reader.result);

          if (!json || !Array.isArray(json.points)) {
            throw new Error("JSON形式が不正です。");
          }

          const loadedPoints = [];
          for (const p of json.points) {
            if (typeof p.lat !== "number" || typeof p.lng !== "number") continue;
            loadedPoints.push({
              lat: p.lat,
              lng: p.lng,
              accuracy: typeof p.accuracy === "number" ? p.accuracy : null,
              timestamp: typeof p.timestamp === "string" ? p.timestamp : new Date().toISOString()
            });
          }

          trackPoints = loadedPoints;
          stationaryCluster = null;

          const loadedMarkers = [];
          if (Array.isArray(json.shotMarkers)) {
            for (const m of json.shotMarkers) {
              if (typeof m.lat !== "number" || typeof m.lng !== "number") continue;
              loadedMarkers.push({
                lat: m.lat,
                lng: m.lng,
                count: typeof m.count === "number" ? m.count : 0,
                source: typeof m.source === "string" ? m.source : "stationary",
                timestamp: typeof m.timestamp === "string" ? m.timestamp : null
              });
            }
          }

          shotMarkers = loadedMarkers;

          if (!shotMarkers.length && trackPoints.length) {
            recomputeShotMarkersFromLoadedTrack();
          }

          updateBottomStatus();
          redrawOverlay();
          fitTrackToView();
        } catch (err) {
          alert("JSONの読み込みに失敗しました。");
          console.error(err);
        }
      };

      reader.readAsText(file, "utf-8");
    }

    // ======================
    // ボタン
    // ======================
    startRecordBtn.addEventListener("click", async () => {
      await startRecording();
    });

    stopRecordBtn.addEventListener("click", () => {
      stopRecording();
    });

    saveRecordBtn.addEventListener("click", () => {
      if (!trackPoints.length && !shotMarkers.length) {
        alert("保存する記録がありません。");
        return;
      }
      saveTrackJson();
    });

    loadRecordBtn.addEventListener("click", () => {
      fileInput.value = "";
      fileInput.click();
    });

    fileInput.addEventListener("change", (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      stopRecording();
      loadTrackJsonFromFile(file);
    });

    // ======================
    // 起動
    // ======================
    function setup() {
      resizeCanvas();
      redrawOverlay();
      updateRecordButtonState();
    }

    map.on("load", async () => {
      setup();

      map.on("render", () => {
        redrawOverlay();
      });

      await requestWakeLock();
      locateOnce({ saveIfRecording: false, recenter: true });
    });

    window.addEventListener("resize", () => {
      resizeCanvas();
      redrawOverlay();
    });

    document.addEventListener("visibilitychange", async () => {
      if (document.visibilityState === "visible") {
        await requestWakeLock();
      } else {
        await releaseWakeLock();
      }
    });

    window.addEventListener("beforeunload", async () => {
      clearRecordingTimers();
      await releaseWakeLock();
    });

    setTimeout(async () => {
      resizeCanvas();
      redrawOverlay();
      await requestWakeLock();
    }, 300);
  </script>
</body>
</html>
