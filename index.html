<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ゴルフ距離リング</title>

  <!-- MapLibre GL JS（地図だけに使用） -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <style>
    :root{
      --jp-font: "Noto Sans JP","Hiragino Sans","Yu Gothic","Meiryo",system-ui,sans-serif;
    }
    html, body { height: 100%; margin: 0; font-family: var(--jp-font); overflow: hidden; }
    #mapWrap { position: absolute; inset: 0; }
    #map { position: absolute; inset: 0; }

    /* 円と文字を確実に出すためのCanvasオーバーレイ */
    #overlay {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      width: 100vw;
      height: 100vh;
    }

    /* 位置情報更新ボタン（これだけ表示） */
    #gpsBtn {
      position: absolute;
      left: 12px;
      top: 12px;
      z-index: 20;
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      background: rgba(17,17,17,0.92);
      color: #fff;
      font-family: var(--jp-font);
      font-size: 14px;
      font-weight: 800;
      box-shadow: 0 8px 22px rgba(0,0,0,0.25);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #gpsBtn:active { transform: translateY(1px); }

    /* 余計なUIを一切出さない */
    .maplibregl-ctrl, .maplibregl-ctrl-bottom-left, .maplibregl-ctrl-bottom-right {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="mapWrap">
    <div id="map"></div>
    <canvas id="overlay"></canvas>
    <button id="gpsBtn" type="button">位置情報を更新</button>
  </div>

  <script>
    // ======================
    // 設定
    // ======================
    const YARD_TO_M = 0.9144;
    const RINGS = [
      { yd: 50,  m: 50  * YARD_TO_M, color: "#E53935" }, // 赤
      { yd: 100, m: 100 * YARD_TO_M, color: "#1E88E5" }, // 青
      { yd: 150, m: 150 * YARD_TO_M, color: "#E53935" }, // 赤
      { yd: 200, m: 200 * YARD_TO_M, color: "#1E88E5" }  // 青
    ];

    const gsiPhotoTiles = "https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg";
    const initialCenter = [139.767, 35.681]; // [lng, lat]
    const initialZoom = 16;

    // ======================
    // MapLibre（地図のみ）
    // ======================
    const map = new maplibregl.Map({
      container: "map",
      style: {
        version: 8,
        sources: {
          "gsi-photo": { type: "raster", tiles: [gsiPhotoTiles], tileSize: 256 }
        },
        layers: [
          { id: "gsi-photo-layer", type: "raster", source: "gsi-photo" }
        ]
      },
      center: initialCenter,
      zoom: initialZoom,
      bearing: 0,
      pitch: 0,
      antialias: true,
      attributionControl: false
    });

    // ======================
    // Canvas Overlay（中心は画面中央）
    // ======================
    const canvas = document.getElementById("overlay");
    const ctx = canvas.getContext("2d");
    let dpr = 1, cssW = 0, cssH = 0;

    function resizeCanvas() {
      dpr = Math.max(1, window.devicePixelRatio || 1);
      cssW = Math.floor(window.innerWidth);
      cssH = Math.floor(window.innerHeight);

      canvas.style.width = cssW + "px";
      canvas.style.height = cssH + "px";
      canvas.width  = Math.floor(cssW * dpr);
      canvas.height = Math.floor(cssH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function destinationPoint(latDeg, lngDeg, distM, bearingDeg) {
      const R = 6378137;
      const brng = bearingDeg * Math.PI / 180;
      const lat1 = latDeg * Math.PI / 180;
      const lng1 = lngDeg * Math.PI / 180;
      const angDist = distM / R;

      const lat2 = Math.asin(
        Math.sin(lat1) * Math.cos(angDist) +
        Math.cos(lat1) * Math.sin(angDist) * Math.cos(brng)
      );
      const lng2 = lng1 + Math.atan2(
        Math.sin(brng) * Math.sin(angDist) * Math.cos(lat1),
        Math.cos(angDist) - Math.sin(lat1) * Math.sin(lat2)
      );
      return { lat: lat2 * 180 / Math.PI, lng: lng2 * 180 / Math.PI };
    }

    function drawLabel(text, x, y) {
      ctx.save();
      ctx.font = 'bold 18px "Noto Sans JP","Hiragino Sans","Yu Gothic","Meiryo",system-ui,sans-serif';
      ctx.textAlign = "center";
      ctx.textBaseline = "bottom";
      ctx.lineWidth = 6;
      ctx.strokeStyle = "rgba(0,0,0,0.92)";
      ctx.strokeText(text, x, y);
      ctx.fillStyle = "#FFFFFF";
      ctx.fillText(text, x, y);
      ctx.restore();
    }

    function drawCenterDot(x, y) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(x, y, 7, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,255,255,0.95)";
      ctx.fill();

      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(17,17,17,0.9)";
      ctx.fill();
      ctx.restore();
    }

    function redrawOverlay() {
      ctx.clearRect(0, 0, cssW, cssH);

      const c = map.getCenter();
      const centerLng = c.lng;
      const centerLat = c.lat;

      // 画面中央固定
      const cx = cssW / 2;
      const cy = cssH / 2;

      for (const r of RINGS) {
        const east = destinationPoint(centerLat, centerLng, r.m, 90);
        const pCenter = map.project([centerLng, centerLat]);
        const pEast = map.project([east.lng, east.lat]);
        const radiusPx = Math.hypot(pEast.x - pCenter.x, pEast.y - pCenter.y);

        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, radiusPx, 0, Math.PI * 2);
        ctx.lineWidth = 2.8;
        ctx.strokeStyle = r.color;
        ctx.globalAlpha = 0.98;
        ctx.stroke();

        ctx.globalAlpha = 0.06;
        ctx.fillStyle = r.color;
        ctx.fill();
        ctx.restore();

        drawLabel(`${r.yd}yd`, cx, cy - radiusPx - 6);
      }

      drawCenterDot(cx, cy);
    }

    // ======================
    // GPS：ボタンで取得（押した時だけ）
    // ======================
    const gpsBtn = document.getElementById("gpsBtn");
    let isLocating = false;

    function setBtn(text) {
      gpsBtn.textContent = text;
    }

    function locateOnce() {
      if (!("geolocation" in navigator)) return;
      if (isLocating) return;

      isLocating = true;
      setBtn("取得中…");

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const lng = pos.coords.longitude;
          const lat = pos.coords.latitude;

          map.easeTo({
            center: [lng, lat],
            zoom: Math.max(map.getZoom(), 16),
            duration: 250
          });

          // すぐ反映
          redrawOverlay();

          isLocating = false;
          setBtn("位置情報を更新");
        },
        (_err) => {
          // 失敗しても表示は増やさない
          isLocating = false;
          setBtn("位置情報を更新");
          redrawOverlay();
        },
        { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 }
      );
    }

    gpsBtn.addEventListener("click", () => locateOnce());

    // ======================
    // 起動
    // ======================
    function setup() {
      resizeCanvas();
      redrawOverlay();
    }

    map.on("load", () => {
      setup();
      map.on("render", () => redrawOverlay());
      // 初回も一度だけ自動で取得を試す（許可プロンプトを出す狙い）
      locateOnce();
    });

    window.addEventListener("resize", () => {
      resizeCanvas();
      redrawOverlay();
    });

    setTimeout(() => {
      resizeCanvas();
      redrawOverlay();
    }, 300);
  </script>
</body>
</html>
